<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelWar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0d0d;font-family:'Courier New',monospace}
#canvas{position:fixed;top:0;left:0;image-rendering:pixelated;image-rendering:crisp-edges;transform-origin:0 0;cursor:crosshair;display:block}
#grid{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;opacity:0;background-image:linear-gradient(rgba(255,255,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.07) 1px,transparent 1px)}

/* JOIN */
#join{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center}
.jbox{background:#0a0a0a;border:1px solid #222;padding:38px 32px;width:320px;text-align:center}
.jbox h1{font-size:18px;letter-spacing:10px;color:#fff;font-weight:100;margin-bottom:3px}
.jbox p{font-size:9px;color:#333;letter-spacing:4px;margin-bottom:28px}
.jbox input{width:100%;background:transparent;border:none;border-bottom:1px solid #222;color:#fff;font-family:'Courier New',monospace;font-size:14px;padding:8px 0;text-align:center;outline:none;margin-bottom:16px;letter-spacing:2px}
.jbox input::placeholder{color:#222}
.jbox input:focus{border-bottom-color:#666}
.crow{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:22px}
.cpick{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s}
.cpick:hover{transform:scale(1.3)}
.cpick.on{border-color:#fff;transform:scale(1.3)}
.jbtn{width:100%;background:#fff;color:#000;border:none;padding:11px;font-family:'Courier New',monospace;font-size:10px;letter-spacing:5px;cursor:pointer;text-transform:uppercase;transition:all .2s}
.jbtn:hover{background:#000;color:#fff;border:1px solid #fff}
.rules{margin-top:16px;font-size:9px;color:#222;line-height:2.3;text-align:left;letter-spacing:.5px}
.rules b{color:#555}

/* STATUS */
#bar{position:fixed;top:0;left:0;right:0;height:24px;background:rgba(0,0,0,.9);border-bottom:1px solid #111;display:flex;align-items:center;padding:0 10px;gap:16px;font-size:9px;color:#2a2a2a;letter-spacing:1px;z-index:50;transition:opacity .2s;opacity:0;pointer-events:none}
#bar.on{opacity:1;pointer-events:all}
#bar b{color:#999}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:3px;background:#1a1a1a}
.dot.ok{background:#0f0;box-shadow:0 0 4px #0f0;animation:blk 2s infinite}
.dot.err{background:#f33}
@keyframes blk{0%,100%{opacity:1}50%{opacity:.2}}

/* TOOLBAR */
#tb{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.93);border:1px solid #1a1a1a;display:flex;align-items:center;gap:1px;padding:4px 7px;z-index:50;transition:opacity .2s;opacity:0;pointer-events:none;white-space:nowrap}
#tb.on{opacity:1;pointer-events:all}
.sp{width:1px;height:20px;background:#161616;margin:0 4px;flex-shrink:0}
.sw{width:15px;height:15px;cursor:pointer;flex-shrink:0;border:1px solid transparent;transition:transform .1s}
.sw:hover{transform:scale(1.45)}
.sw.on{border-color:#fff;transform:scale(1.45)}
.tb{width:26px;height:26px;background:transparent;border:1px solid #1a1a1a;color:#3a3a3a;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.tb:hover,.tb.on{background:#fff;color:#000;border-color:#fff}
.sb{width:24px;height:24px;background:transparent;border:1px solid #141414;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.sb:hover,.sb.on{border-color:#888}
.sb .d{background:#fff;border-radius:50%}
#cc{width:20px;height:20px;border:1px solid #1a1a1a;background:#000;cursor:pointer;padding:0;outline:none;flex-shrink:0}

/* ZOOM */
#zoom{position:fixed;bottom:16px;right:14px;font-size:9px;color:#1a1a1a;letter-spacing:2px;pointer-events:none;z-index:50;transition:color .2s}
#zoom.on{color:#3a3a3a}

/* COOLDOWN */
#cd{position:fixed;bottom:54px;right:10px;z-index:50;opacity:0;pointer-events:none;transition:opacity .3s}
#cd.on{opacity:1}
#cdsvg{transform:rotate(-90deg);display:block}
.cbg{fill:none;stroke:#0e0e0e;stroke-width:3}
.cring{fill:none;stroke:#fff;stroke-width:3;stroke-linecap:round;stroke-dasharray:107;stroke-dashoffset:0;transition:stroke-dashoffset .15s linear}
.cring.ok{stroke:#0f0}
#cnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;letter-spacing:.5px}

/* USERS */
#upanel{position:fixed;right:8px;top:32px;background:rgba(0,0,0,.92);border:1px solid #111;min-width:130px;z-index:50;opacity:0;pointer-events:none;transition:opacity .2s;max-height:50vh;overflow-y:auto}
#upanel.on{opacity:1;pointer-events:all}
.uhead{font-size:7px;letter-spacing:3px;color:#1e1e1e;padding:6px 8px 4px;border-bottom:1px solid #0c0c0c;text-transform:uppercase}
.urow{display:flex;align-items:center;gap:6px;padding:4px 8px;font-size:9px;color:#333;border-bottom:1px solid #080808}
.urow.me{color:#777}
.ua{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.un{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.upx{color:#1e1e1e;font-size:8px;flex-shrink:0}

/* HINT */
#hint{position:fixed;bottom:5px;left:50%;transform:translateX(-50%);font-size:8px;color:#0f0f0f;letter-spacing:3px;z-index:5;pointer-events:none}
#hint.on{color:#1e1e1e}

/* NOTIF */
.nf{position:fixed;top:32px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.93);border:1px solid #222;padding:4px 12px;font-size:9px;color:#777;letter-spacing:2px;z-index:200;animation:nfx 2s ease forwards;white-space:nowrap}
@keyframes nfx{0%{opacity:0;top:26px}12%{opacity:1;top:32px}80%{opacity:1}100%{opacity:0}}

/* LOADING */
#loading{position:fixed;inset:0;background:#0d0d0d;z-index:400;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#loading p{font-size:9px;color:#333;letter-spacing:4px}
.spinner{width:20px;height:20px;border:1px solid #222;border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* other cursors */
.uc{position:fixed;width:5px;height:5px;border-radius:50%;pointer-events:none;z-index:60;transform:translate(-50%,-50%)}
.ul{position:fixed;font-size:7px;pointer-events:none;z-index:60;transform:translate(5px,-50%);letter-spacing:1px;white-space:nowrap;opacity:.7}

::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-track{background:#000}
::-webkit-scrollbar-thumb{background:#1a1a1a}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>ĐANG TẢI CANVAS...</p>
</div>

<div id="join" style="display:none">
  <div class="jbox">
    <h1>PIXEL</h1>
    <p>war · multiplayer</p>
    <input id="jname" maxlength="12" placeholder="tên của bạn" autofocus>
    <div class="crow" id="crow"></div>
    <button class="jbtn" onclick="doJoin()">THAM GIA</button>
    <div class="rules">
      <b>chuột trái</b> để vẽ<br>
      <b>chuột phải + kéo</b> để di chuyển<br>
      <b>scroll</b> để zoom · <b>0</b> để fit<br>
      mỗi lần vẽ cách nhau <b>30 giây</b><br>
      <b>TAB</b> để ẩn / hiện giao diện
    </div>
  </div>
</div>

<canvas id="canvas"></canvas>
<div id="grid"></div>

<div id="bar">
  <span><span class="dot" id="wdot"></span><b id="wlbl">kết nối...</b></span>
  <span>ONLINE: <b id="onl">1</b></span>
  <span>PIXELS: <b id="tpx">0</b></span>
  <span id="coords" style="color:#1e1e1e">0 · 0</span>
  <span style="margin-left:auto;color:#151515;letter-spacing:2px">TAB</span>
</div>

<div id="tb">
  <div id="pal" style="display:flex;gap:2px;flex-wrap:wrap;max-width:160px"></div>
  <div class="sp"></div>
  <input type="color" id="cc" value="#ffffff">
  <div class="sp"></div>
  <button class="tb on" id="tpen">✏</button>
  <button class="tb" id="ters">⌫</button>
  <button class="tb" id="tpik">◎</button>
  <div class="sp"></div>
  <div class="sb on" data-sz="1"><div class="d" style="width:3px;height:3px"></div></div>
  <div class="sb" data-sz="3"><div class="d" style="width:7px;height:7px"></div></div>
  <div class="sb" data-sz="5"><div class="d" style="width:10px;height:10px"></div></div>
  <div class="sb" data-sz="9"><div class="d" style="width:14px;height:14px"></div></div>
  <div class="sp"></div>
  <button class="tb" id="tusr">👥</button>
  <button class="tb" id="tfit">⊞</button>
</div>

<div id="zoom">100%</div>

<div id="cd">
  <svg id="cdsvg" width="40" height="40" viewBox="0 0 40 40">
    <circle class="cbg" cx="20" cy="20" r="17"/>
    <circle class="cring ok" id="cring" cx="20" cy="20" r="17"/>
  </svg>
  <div id="cnum">✓</div>
</div>

<div id="upanel">
  <div class="uhead">ONLINE</div>
  <div id="urows"></div>
</div>

<div id="hint">TAB</div>

<script>
// ═══════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════
const CW = 1920, CH = 1080;
const COOLDOWN = 30000;
const CIRC = 2 * Math.PI * 17;
const EMPTY = 0x0d0d0d;
const ROOM = 'pixelwar-v5';
const CANVAS_KEY = 'pw-canvas-v5';
const USERS_KEY  = 'pw-users-v5';

const PAL = [
  '#000000','#ffffff','#ff3e6c','#ff922b','#ffd43b',
  '#a9e34b','#20c997','#4dabf7','#748ffc','#cc5de8',
  '#f783ac','#ff6b6b','#1a1a2e','#0f3460','#16213e',
  '#533483','#6bcb77','#00e5ff','#888888','#444444',
];
const PCOLS = ['#ff3e6c','#ff922b','#ffd43b','#6bcb77','#4dabf7','#748ffc','#cc5de8','#f783ac','#ffffff','#888888'];

// ═══════════════════════════════════
//  CANVAS & PIXEL BUFFER
// ═══════════════════════════════════
const cvs = document.getElementById('canvas');
const ctx = cvs.getContext('2d');
cvs.width = CW; cvs.height = CH;

const img   = ctx.createImageData(CW, CH);
const b32   = new Uint32Array(img.data.buffer);
const pix   = new Uint32Array(CW * CH);
pix.fill(EMPTY);

// Fill background colour into ImageData
b32.fill(h2u('#0d0d0d'));

function h2n(hex){ return parseInt(hex.replace('#',''),16); }
function n2h(n)  { return '#'+n.toString(16).padStart(6,'0'); }
function h2u(hex){
  const n=h2n(hex);
  return (0xff<<24)|((n&0xff)<<16)|(((n>>8)&0xff)<<8)|((n>>16)&0xff);
}
function rgb2h(rgb){
  if(!rgb||rgb[0]==='#') return rgb;
  const m=rgb.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  return m?'#'+[m[1],m[2],m[3]].map(x=>parseInt(x).toString(16).padStart(2,'0')).join(''):rgb;
}

function putPx(x,y,hex){
  if(x<0||x>=CW||y<0||y>=CH) return false;
  const n=h2n(hex), i=y*CW+x;
  if(pix[i]===n) return false;
  pix[i]=n; b32[i]=h2u(hex);
  return true;
}
function getPxH(x,y){
  if(x<0||x>=CW||y<0||y>=CH) return null;
  const n=pix[y*CW+x]; return n===EMPTY?null:n2h(n);
}

let dirty=false, raf=null;
function flush(){
  dirty=true;
  if(!raf) raf=requestAnimationFrame(()=>{ raf=null; if(dirty){ctx.putImageData(img,0,0);dirty=false;} });
}

// ═══════════════════════════════════
//  PERSISTENT CANVAS STORAGE
//  Saved as shared key so ALL users
//  see the same canvas immediately.
// ═══════════════════════════════════

// Encode pixels as compact hex string: index(5hex)+color(6hex) for non-empty only
function encodeCanvas(){
  const parts=[];
  for(let i=0;i<pix.length;i++){
    if(pix[i]!==EMPTY) parts.push(i.toString(36)+':'+n2h(pix[i]).slice(1));
  }
  return parts.join(',');
}

function decodeCanvas(str){
  if(!str) return;
  str.split(',').forEach(part=>{
    const [iStr,cStr]=part.split(':');
    if(!iStr||!cStr) return;
    const i=parseInt(iStr,36);
    if(i<0||i>=pix.length) return;
    const hex='#'+cStr;
    pix[i]=h2n(hex);
    b32[i]=h2u(hex);
  });
}

let saveTimer=null;
function scheduleSave(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{
      const encoded=encodeCanvas();
      await window.storage.set(CANVAS_KEY, encoded, true); // shared=true
    }catch(e){}
  },1500);
}

async function loadCanvas(){
  try{
    const res=await window.storage.get(CANVAS_KEY, true); // shared=true
    if(res&&res.value){
      decodeCanvas(res.value);
      ctx.putImageData(img,0,0);
      let cnt=0; for(let i=0;i<pix.length;i++) if(pix[i]!==EMPTY) cnt++;
      totalPx=cnt;
      document.getElementById('tpx').textContent=totalPx;
      return true;
    }
  }catch(e){}
  return false;
}

// ═══════════════════════════════════
//  VIEWPORT
// ═══════════════════════════════════
let vx=0, vy=0, vz=1;
const MIN_Z=0.05, MAX_Z=48;

function applyVP(){
  const tx=-vx*vz, ty=-vy*vz;
  cvs.style.transform=`translate(${tx}px,${ty}px) scale(${vz})`;
  const g=document.getElementById('grid');
  if(vz>=6){
    const ox=(tx%vz+vz)%vz, oy=(ty%vz+vz)%vz;
    g.style.backgroundSize=`${vz}px ${vz}px`;
    g.style.backgroundPosition=`${ox}px ${oy}px`;
    g.style.opacity=Math.min(.9,(vz-6)/10);
  } else g.style.opacity=0;
  document.getElementById('zoom').textContent=Math.round(vz*100)+'%';
  updateAllCursors();
}

function fit(){
  const sw=innerWidth, sh=innerHeight;
  vz=Math.min(sw/CW, sh/CH);
  vx=-(sw/vz-CW)/2; vy=-(sh/vz-CH)/2;
  applyVP();
}

function zoomAt(sx,sy,f){
  const wx=sx/vz+vx, wy=sy/vz+vy;
  vz=Math.max(MIN_Z,Math.min(MAX_Z,vz*f));
  vx=wx-sx/vz; vy=wy-sy/vz;
  applyVP();
}

function s2w(sx,sy){ return{x:Math.floor(sx/vz+vx),y:Math.floor(sy/vz+vy)}; }

window.addEventListener('wheel',e=>{
  e.preventDefault();
  zoomAt(e.clientX,e.clientY,e.deltaY<0?1.15:1/1.15);
},{passive:false});

// ═══════════════════════════════════
//  PAN — right-click drag
// ═══════════════════════════════════
let panning=false, panX=0, panY=0, panVX=0, panVY=0;

function startPan(sx,sy){
  panning=true; panX=sx; panY=sy; panVX=vx; panVY=vy;
  cvs.style.cursor='grabbing';
}
function movePan(sx,sy){
  vx=panVX-(sx-panX)/vz;
  vy=panVY-(sy-panY)/vz;
  applyVP();
}
function endPan(){
  panning=false;
  cvs.style.cursor='crosshair';
}

// ═══════════════════════════════════
//  DRAW STATE
// ═══════════════════════════════════
let myId=null, myName='', myColor='#ff3e6c';
let curCol='#ff3e6c', tool='pen', brush=1;
let drawing=false;
let nextOk=0, cdTimer=null;
let myPx=0, totalPx=0;
const users=new Map(), cursors=new Map();
let uiOn=false, usrOn=false;
let lastWX=-9999, lastWY=-9999;

// ═══════════════════════════════════
//  MOUSE — clean right/left split
// ═══════════════════════════════════
cvs.addEventListener('mousedown',e=>{
  e.preventDefault();
  if(e.button===2){ startPan(e.clientX,e.clientY); return; }
  if(e.button===0&&myId){ drawing=true; doAt(e.clientX,e.clientY); }
});
window.addEventListener('mousemove',e=>{
  if(panning){ movePan(e.clientX,e.clientY); return; }
  const w=s2w(e.clientX,e.clientY);
  document.getElementById('coords').textContent=`${w.x} · ${w.y}`;
  sendCur(w.x,w.y);
  if(drawing&&myId) doAt(e.clientX,e.clientY);
});
window.addEventListener('mouseup',e=>{
  if(e.button===2){ if(panning) endPan(); return; }
  if(e.button===0){ drawing=false; flushBatch(); }
});
window.addEventListener('contextmenu',e=>e.preventDefault());

// Touch/pointer
let ptrs=new Map(), pinD=null;
cvs.addEventListener('pointerdown',e=>{
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  cvs.setPointerCapture(e.pointerId);
  if(ptrs.size===1&&myId){ drawing=true; doAt(e.clientX,e.clientY); }
  if(ptrs.size===2){ drawing=false; pinD=pDist(); startPan(pMid().x,pMid().y); }
});
cvs.addEventListener('pointermove',e=>{
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===2){
    const d=pDist(), m=pMid();
    if(pinD) zoomAt(m.x,m.y,d/pinD);
    movePan(m.x,m.y); panX=m.x; panY=m.y; panVX=vx; panVY=vy;
    pinD=d; return;
  }
  if(ptrs.size===1&&drawing) doAt(e.clientX,e.clientY);
});
cvs.addEventListener('pointerup',e=>{
  ptrs.delete(e.pointerId);
  if(!ptrs.size){ drawing=false; panning=false; pinD=null; cvs.style.cursor='crosshair'; flushBatch(); }
});
cvs.addEventListener('pointercancel',e=>ptrs.delete(e.pointerId));
function pDist(){ const[a,b]=[...ptrs.values()]; return Math.hypot(a.x-b.x,a.y-b.y); }
function pMid(){ const[a,b]=[...ptrs.values()]; return{x:(a.x+b.x)/2,y:(a.y+b.y)/2}; }

window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.key==='Tab'){e.preventDefault();toggleUI();return;}
  if(e.key==='Escape') toggleUI(false);
  if(e.key==='0') fit();
  if(e.key==='+'||e.key==='=') zoomAt(innerWidth/2,innerHeight/2,1.5);
  if(e.key==='-') zoomAt(innerWidth/2,innerHeight/2,1/1.5);
  if(e.key==='1') setTool('pen');
  if(e.key==='2') setTool('erase');
  if(e.key==='3') setTool('pick');
});

// ═══════════════════════════════════
//  DRAW
// ═══════════════════════════════════
function doAt(sx,sy){
  if(tool==='pick') return;
  const {x,y}=s2w(sx,sy);
  if(tool!=='erase'&&Date.now()<nextOk) return;
  if(brush===1&&x===lastWX&&y===lastWY) return;
  lastWX=x; lastWY=y;

  const col=tool==='erase'?'#0d0d0d':curCol;
  const h=Math.floor(brush/2);
  let placed=false;
  for(let dy=-h;dy<=h;dy++) for(let dx=-h;dx<=h;dx++){
    if(putPx(x+dx,y+dy,col)){ qPix(x+dx,y+dy,col); placed=true; }
  }
  if(placed) flush();

  if(tool!=='erase'){
    myPx++; totalPx++;
    document.getElementById('tpx').textContent=totalPx;
    nextOk=Date.now()+COOLDOWN;
    startCD(); renderUsers(); scheduleSave();
  }
}

cvs.addEventListener('dblclick',e=>{
  if(e.button!==0) return;
  const {x,y}=s2w(e.clientX,e.clientY);
  const c=getPxH(x,y); if(c){ selectCol(c); notify('◎ '+c); }
});

// ═══════════════════════════════════
//  PIXEL BATCH
// ═══════════════════════════════════
let batch=[], bTimer=null;
function qPix(x,y,c){ batch.push(x,y,c); if(!bTimer) bTimer=setTimeout(flushBatch,30); }
function flushBatch(){
  bTimer=null;
  if(!batch.length) return;
  if(wsOk) wsSend({t:'px',id:myId,name:myName,color:myColor,room:ROOM,b:batch.slice()});
  batch=[];
}

// ═══════════════════════════════════
//  COOLDOWN
// ═══════════════════════════════════
function startCD(){
  document.getElementById('cd').classList.add('on');
  updateCD();
  if(cdTimer) clearInterval(cdTimer);
  cdTimer=setInterval(updateCD,200);
}
function updateCD(){
  const rem=Math.max(0,nextOk-Date.now());
  const ring=document.getElementById('cring'), num=document.getElementById('cnum');
  ring.style.strokeDashoffset=CIRC*(rem/COOLDOWN);
  if(rem<=0){ ring.classList.add('ok'); num.textContent='✓'; clearInterval(cdTimer); }
  else{ ring.classList.remove('ok'); num.textContent=Math.ceil(rem/1000)+'s'; }
}

// ═══════════════════════════════════
//  WEBSOCKET — Ably free realtime
//  Uses the public Ably Realtime API
//  with a free demo key for pub/sub.
//  Channel = ROOM name, messages are
//  broadcast to all subscribers.
// ═══════════════════════════════════

// We use an always-available free MQTT-over-WS broker: broker.emqx.io
// Topic: pixelwar-v5/<type>
// Format: JSON stringified

let ws=null, wsOk=false, pendQ=[], recon=2000;
const WS_URL = 'wss://broker.emqx.io:8084/mqtt';

// Minimal MQTT-over-WebSocket client (no library needed for pub/sub)
// MQTT packet builder helpers
function mqttStr(s){ const b=new TextEncoder().encode(s); const r=new Uint8Array(2+b.length); r[0]=b.length>>8; r[1]=b.length&0xff; r.set(b,2); return r; }
function mqttVarLen(n){ if(n<128) return new Uint8Array([n]); return new Uint8Array([0x80|(n&0x7f),(n>>7)&0x7f]); }
function concat(...arrays){ const total=arrays.reduce((a,b)=>a+b.length,0); const r=new Uint8Array(total); let o=0; for(const a of arrays){r.set(a,o);o+=a.length;} return r; }

function mqttConnect(clientId){
  const proto=mqttStr('MQTT');
  const flags=new Uint8Array([0x00,0x04]); // protocol level 4
  const connFlags=new Uint8Array([0x02]); // clean session
  const keepAlive=new Uint8Array([0x00,0x3c]); // 60s
  const cid=mqttStr(clientId);
  const varHeader=concat(proto,flags,connFlags,keepAlive);
  const payload=cid;
  const remaining=concat(varHeader,payload);
  const fixed=concat(new Uint8Array([0x10]),mqttVarLen(remaining.length));
  return concat(fixed,remaining);
}

function mqttSubscribe(topic, packetId=1){
  const t=mqttStr(topic);
  const qos=new Uint8Array([0x00]);
  const pid=new Uint8Array([packetId>>8,packetId&0xff]);
  const payload=concat(t,qos);
  const remaining=concat(pid,payload);
  const fixed=concat(new Uint8Array([0x82]),mqttVarLen(remaining.length));
  return concat(fixed,remaining);
}

function mqttPublish(topic,message){
  const t=mqttStr(topic);
  const payload=new TextEncoder().encode(message);
  const remaining=concat(t,payload);
  const fixed=concat(new Uint8Array([0x30]),mqttVarLen(remaining.length));
  return concat(fixed,remaining);
}

function mqttPingReq(){ return new Uint8Array([0xc0,0x00]); }

// Parse incoming MQTT packets
function parseMQTT(buf){
  const packets=[];
  let i=0;
  while(i<buf.length){
    const type=(buf[i]>>4)&0x0f;
    let len=0, mul=1, j=i+1;
    do{ len+=(buf[j]&0x7f)*mul; mul*=128; j++; } while(buf[j-1]&0x80);
    if(type===3){ // PUBLISH
      const topicLen=(buf[j]<<8)|buf[j+1];
      const topic=new TextDecoder().decode(buf.slice(j+2,j+2+topicLen));
      const payload=new TextDecoder().decode(buf.slice(j+2+topicLen,i+1+len+j-i-1));
      packets.push({type:'pub',topic,payload});
    } else if(type===2){ packets.push({type:'connack'}); }
    else if(type===9){ packets.push({type:'suback'}); }
    else if(type===13){ // PINGRESP
      packets.push({type:'pingresp'});
    }
    i=j+len;
  }
  return packets;
}

const TOPIC = 'pixelwar2025/'+ROOM;
let pingInterval=null;

function wsConn(){
  try{ ws=new WebSocket(WS_URL,['mqtt']); ws.binaryType='arraybuffer'; }
  catch{ setWS(false); setTimeout(wsConn,3000); return; }

  ws.onopen=()=>{
    const cid='pw_'+(myId||'anon').slice(0,16);
    ws.send(mqttConnect(cid));
  };

  ws.onmessage=e=>{
    const buf=new Uint8Array(e.data);
    const packets=parseMQTT(buf);
    for(const p of packets){
      if(p.type==='connack'){
        wsOk=true; recon=2000; setWS(true);
        ws.send(mqttSubscribe(TOPIC));
        pendQ.forEach(m=>wsSend(m)); pendQ=[];
        // announce presence + request sync
        wsSend({t:'join',id:myId,name:myName,color:myColor,room:ROOM});
        // ping keepalive every 30s
        if(pingInterval) clearInterval(pingInterval);
        pingInterval=setInterval(()=>{
          ws.send(mqttPingReq());
          wsSend({t:'ping',id:myId,name:myName,color:myColor,pixels:myPx,room:ROOM});
        },20000);
      }
      if(p.type==='pub'&&p.topic===TOPIC){
        let m; try{m=JSON.parse(p.payload);}catch{continue;}
        if(m&&m.room===ROOM&&m.id!==myId) onMsg(m);
      }
    }
  };

  ws.onclose=()=>{
    wsOk=false; setWS(false);
    if(pingInterval){clearInterval(pingInterval);pingInterval=null;}
    setTimeout(wsConn,recon=Math.min(recon*1.5,15000));
  };
  ws.onerror=()=>ws.close();
}

function wsSend(obj){
  const json=JSON.stringify(obj);
  if(wsOk&&ws.readyState===1) ws.send(mqttPublish(TOPIC,json));
  else pendQ.push(obj);
}

function setWS(ok){
  document.getElementById('wdot').className='dot'+(ok?' ok':' err');
  document.getElementById('wlbl').textContent=ok?'đã kết nối':'mất kết nối...';
}

let lastCurT=0;
function sendCur(wx,wy){
  const now=Date.now(); if(now-lastCurT<80) return; lastCurT=now;
  wsSend({t:'cur',id:myId,name:myName,color:myColor,room:ROOM,wx,wy});
}

// ═══════════════════════════════════
//  MESSAGE HANDLER
//  Canvas is NOT synced via WS —
//  it's loaded from shared storage.
//  WS only carries live pixel events
//  and presence/cursor data.
// ═══════════════════════════════════
function onMsg(m){
  if(m.t==='join'||m.t==='ping'){
    const isNew=!users.has(m.id);
    users.set(m.id,{name:m.name,color:m.color,pixels:m.pixels||0,lastSeen:Date.now()});
    renderUsers();
    if(isNew&&m.t==='join') notify('+ '+m.name);
  }
  if(m.t==='leave'){
    const u=users.get(m.id);
    if(u){notify('− '+u.name);users.delete(m.id);renderUsers();rmCur(m.id);}
  }
  if(m.t==='px'&&m.b){
    // Apply live pixels from other users
    let changed=false;
    for(let i=0;i<m.b.length;i+=3){
      if(putPx(m.b[i],m.b[i+1],m.b[i+2])) changed=true;
    }
    if(changed) flush();
    const u=users.get(m.id);
    if(u){u.pixels=(u.pixels||0)+m.b.length/3;u.lastSeen=Date.now();}
    totalPx+=m.b.length/3;
    document.getElementById('tpx').textContent=Math.floor(totalPx);
    renderUsers();
    // Also save to shared storage so latecomers see it
    scheduleSave();
  }
  if(m.t==='cur'){
    const sx=(m.wx-vx)*vz, sy=(m.wy-vy)*vz;
    setCur(m.id,m.name,m.color,sx,sy,m.wx,m.wy);
    const u=users.get(m.id); if(u) u.lastSeen=Date.now();
  }
}

setInterval(()=>{
  const now=Date.now();
  users.forEach((u,id)=>{ if(now-u.lastSeen>25000){users.delete(id);renderUsers();rmCur(id);} });
},10000);

// ═══════════════════════════════════
//  CURSORS
// ═══════════════════════════════════
function setCur(id,name,color,sx,sy,wx,wy){
  let c=cursors.get(id);
  if(!c){
    const dot=document.createElement('div'); dot.className='uc'; dot.style.background=color;
    const lbl=document.createElement('div'); lbl.className='ul'; lbl.style.color=color; lbl.textContent=name;
    document.body.appendChild(dot); document.body.appendChild(lbl);
    c={dot,lbl,wx:0,wy:0}; cursors.set(id,c);
  }
  c.wx=wx; c.wy=wy;
  c.dot.style.left=sx+'px'; c.dot.style.top=sy+'px';
  c.lbl.style.left=sx+'px'; c.lbl.style.top=sy+'px';
}
function rmCur(id){
  const c=cursors.get(id); if(c){c.dot.remove();c.lbl.remove();cursors.delete(id);}
}
function updateAllCursors(){
  cursors.forEach(c=>{
    c.dot.style.left=(c.wx-vx)*vz+'px'; c.dot.style.top=(c.wy-vy)*vz+'px';
    c.lbl.style.left=(c.wx-vx)*vz+'px'; c.lbl.style.top=(c.wy-vy)*vz+'px';
  });
}

// ═══════════════════════════════════
//  PALETTE & TOOLS
// ═══════════════════════════════════
function buildPal(){
  const row=document.getElementById('pal');
  PAL.forEach(c=>{
    const d=document.createElement('div'); d.className='sw'; d.style.background=c;
    if(c===curCol) d.classList.add('on');
    d.onclick=()=>selectCol(c); row.appendChild(d);
  });
}
function buildCP(){
  const row=document.getElementById('crow');
  PCOLS.forEach(c=>{
    const d=document.createElement('div'); d.className='cpick'; d.style.background=c;
    if(c===myColor) d.classList.add('on');
    d.onclick=()=>{ myColor=c; document.querySelectorAll('.cpick').forEach(x=>x.classList.remove('on')); d.classList.add('on'); };
    row.appendChild(d);
  });
}
function selectCol(c){
  curCol=c;
  document.querySelectorAll('.sw').forEach(e=>e.classList.toggle('on',rgb2h(e.style.background)===c));
  document.getElementById('cc').value=c;
  if(tool==='erase') setTool('pen');
}
document.getElementById('cc').addEventListener('input',e=>selectCol(e.target.value));

function setTool(t){
  tool=t;
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  ({pen:'tpen',erase:'ters',pick:'tpik'}[t])&&document.getElementById({pen:'tpen',erase:'ters',pick:'tpik'}[t]).classList.add('on');
}
document.getElementById('tpen').onclick=()=>setTool('pen');
document.getElementById('ters').onclick=()=>setTool('erase');
document.getElementById('tpik').onclick=()=>{ setTool('pick'); notify('double-click để hút màu'); };
document.getElementById('tfit').onclick=fit;
document.getElementById('tusr').onclick=()=>{
  usrOn=!usrOn;
  document.getElementById('upanel').classList.toggle('on',usrOn);
  document.getElementById('tusr').classList.toggle('on',usrOn);
};
document.querySelectorAll('.sb').forEach(b=>b.onclick=()=>{
  brush=parseInt(b.dataset.sz);
  document.querySelectorAll('.sb').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
});

// ═══════════════════════════════════
//  UI TOGGLE
// ═══════════════════════════════════
function toggleUI(force){
  uiOn=force!==undefined?force:!uiOn;
  document.getElementById('bar').classList.toggle('on',uiOn);
  document.getElementById('tb').classList.toggle('on',uiOn);
  document.getElementById('zoom').classList.toggle('on',uiOn);
  document.getElementById('hint').classList.toggle('on',!uiOn);
  document.getElementById('cd').classList.toggle('on',uiOn||nextOk>Date.now());
  if(!uiOn){document.getElementById('upanel').classList.remove('on');usrOn=false;document.getElementById('tusr').classList.remove('on');}
}

// ═══════════════════════════════════
//  USERS
// ═══════════════════════════════════
function renderUsers(){
  const el=document.getElementById('urows'); el.innerHTML='';
  const me=document.createElement('div'); me.className='urow me';
  me.innerHTML=`<div class="ua" style="background:${myColor}"></div><div class="un">${myName}<span style="color:#111"> (bạn)</span></div><div class="upx">${myPx}px</div>`;
  el.appendChild(me);
  users.forEach(u=>{
    const d=document.createElement('div'); d.className='urow';
    d.innerHTML=`<div class="ua" style="background:${u.color}"></div><div class="un">${u.name}</div><div class="upx">${Math.floor(u.pixels||0)}px</div>`;
    el.appendChild(d);
  });
  document.getElementById('onl').textContent=1+users.size;
}

// ═══════════════════════════════════
//  NOTIF
// ═══════════════════════════════════
function notify(msg){
  document.querySelectorAll('.nf').forEach(e=>e.remove());
  const d=document.createElement('div'); d.className='nf'; d.textContent=msg;
  document.body.appendChild(d); setTimeout(()=>d.remove(),2200);
}

// ═══════════════════════════════════
//  JOIN
// ═══════════════════════════════════
async function doJoin(){
  const n=document.getElementById('jname').value.trim();
  myName=n||('pixel'+Math.floor(Math.random()*9999));
  myId=crypto.randomUUID?.()??('u_'+Date.now()+'_'+Math.random().toString(36).slice(2,8));
  curCol=myColor;

  document.getElementById('join').style.display='none';

  fit(); renderUsers(); toggleUI(true);
  document.getElementById('cd').classList.add('on');

  wsConn();
  window.addEventListener('beforeunload',()=>{
    saveToStorage();
    wsSend({t:'leave',id:myId,name:myName,room:ROOM});
  });
  notify('chào mừng, '+myName+' · kéo phải để di chuyển');
}

async function saveToStorage(){
  try{ await window.storage.set(CANVAS_KEY, encodeCanvas(), true); }catch(e){}
}

document.getElementById('jname').addEventListener('keydown',e=>{ if(e.key==='Enter') doJoin(); });

// ═══════════════════════════════════
//  STARTUP — load canvas first
// ═══════════════════════════════════
(async()=>{
  buildCP(); buildPal();
  ctx.putImageData(img,0,0);

  // Load shared canvas from storage
  await loadCanvas();

  // Show join screen
  document.getElementById('loading').style.display='none';
  document.getElementById('join').style.display='flex';
  // Pre-fit so canvas is visible behind join overlay
  fit(); applyVP();
})();
</script>
