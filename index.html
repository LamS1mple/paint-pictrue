<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelWar</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Courier New',monospace; cursor:crosshair; }

#canvas {
  position:fixed; top:0; left:0;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  transform-origin:0 0;
  cursor:crosshair;
}

#gridOverlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:2; opacity:0; transition:opacity .2s;
  background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);
}

/* JOIN */
#joinScreen { position:fixed; inset:0; z-index:300; background:rgba(0,0,0,0.93); display:flex; align-items:center; justify-content:center; }
.jbox { background:#0c0c0c; border:1px solid #2a2a2a; padding:36px 32px; width:340px; text-align:center; }
.jbox h1 { font-size:20px; letter-spacing:8px; color:#fff; font-weight:100; margin-bottom:4px; }
.jbox .sub { font-size:9px; color:#333; letter-spacing:4px; margin-bottom:28px; }
.jbox input { width:100%; background:transparent; border:none; border-bottom:1px solid #2a2a2a; color:#fff; font-family:'Courier New',monospace; font-size:15px; padding:8px 0; text-align:center; outline:none; margin-bottom:18px; letter-spacing:2px; }
.jbox input::placeholder { color:#2a2a2a; }
.jbox input:focus { border-bottom-color:#888; }
.color-row { display:flex; gap:7px; justify-content:center; flex-wrap:wrap; margin-bottom:22px; }
.cpick { width:24px; height:24px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform .15s; }
.cpick:hover { transform:scale(1.25); }
.cpick.sel { border-color:#fff; transform:scale(1.25); }
.jbtn { width:100%; background:#fff; color:#000; border:none; padding:11px; font-family:'Courier New',monospace; font-size:11px; letter-spacing:4px; cursor:pointer; text-transform:uppercase; transition:all .2s; }
.jbtn:hover { background:#000; color:#fff; border:1px solid #fff; }
.rules { margin-top:18px; font-size:9px; color:#2a2a2a; line-height:2.2; text-align:left; letter-spacing:1px; }
.rules b { color:#555; }

/* STATUS BAR */
#statusBar { position:fixed; top:0; left:0; right:0; height:26px; background:rgba(0,0,0,0.88); border-bottom:1px solid #141414; display:flex; align-items:center; padding:0 12px; gap:18px; font-size:9px; color:#333; letter-spacing:1px; z-index:50; opacity:0; pointer-events:none; transition:opacity .2s; }
#statusBar.vis { opacity:1; pointer-events:all; }
#statusBar b { color:#aaa; }
.wdot { width:5px; height:5px; border-radius:50%; display:inline-block; margin-right:4px; background:#222; }
.wdot.ok { background:#0f0; box-shadow:0 0 4px #0f0; animation:blink 2s infinite; }
.wdot.err { background:#f33; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* TOOLBAR */
#toolbar { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.92); border:1px solid #1e1e1e; display:flex; align-items:center; gap:1px; padding:5px 8px; z-index:50; opacity:0; pointer-events:none; transition:opacity .2s; white-space:nowrap; }
#toolbar.vis { opacity:1; pointer-events:all; }
.sep { width:1px; height:22px; background:#1e1e1e; margin:0 5px; flex-shrink:0; }
.sw { width:16px; height:16px; cursor:pointer; flex-shrink:0; border:1px solid transparent; transition:transform .1s; }
.sw:hover { transform:scale(1.4); }
.sw.sel { border-color:#fff; transform:scale(1.4); }
.tbtn { width:28px; height:28px; background:transparent; border:1px solid #1e1e1e; color:#444; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; }
.tbtn:hover,.tbtn.act { background:#fff; color:#000; border-color:#fff; }
.szbtn { width:26px; height:26px; background:transparent; border:1px solid #161616; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; }
.szbtn:hover,.szbtn.act { border-color:#888; }
.szbtn .d { background:#fff; border-radius:50%; }
#customColorInput { width:20px; height:20px; border:1px solid #222; background:#000; cursor:pointer; padding:0; outline:none; flex-shrink:0; }

/* ZOOM BADGE */
#zoomBadge { position:fixed; bottom:18px; right:16px; z-index:50; font-size:9px; color:#111; letter-spacing:2px; pointer-events:none; transition:color .2s; }
#zoomBadge.vis { color:#444; }

/* COOLDOWN RING */
#cdWrap { position:fixed; bottom:58px; right:12px; z-index:50; opacity:0; pointer-events:none; transition:opacity .3s; }
#cdWrap.vis { opacity:1; }
#cdSvg { transform:rotate(-90deg); display:block; }
.cdbg { fill:none; stroke:#111; stroke-width:3; }
.cdring { fill:none; stroke:#fff; stroke-width:3; stroke-linecap:round; stroke-dasharray:107; stroke-dashoffset:0; transition:stroke-dashoffset .15s linear; }
.cdring.rdy { stroke:#0f0; }
#cdNum { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:9px; color:#fff; letter-spacing:.5px; }

/* USERS PANEL */
#usersPanel { position:fixed; right:10px; top:34px; background:rgba(0,0,0,0.9); border:1px solid #141414; min-width:140px; z-index:50; opacity:0; pointer-events:none; transition:opacity .2s; max-height:55vh; overflow-y:auto; }
#usersPanel.vis { opacity:1; pointer-events:all; }
.upt { font-size:8px; letter-spacing:3px; color:#252525; padding:7px 10px 5px; border-bottom:1px solid #0e0e0e; text-transform:uppercase; }
.urow { display:flex; align-items:center; gap:7px; padding:5px 10px; font-size:9px; color:#444; border-bottom:1px solid #0a0a0a; animation:fin .3s ease-out; }
.urow.me { color:#888; }
@keyframes fin{from{opacity:0;transform:translateX(5px)}to{opacity:1;transform:none}}
.ua { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.uname { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.upx { color:#222; font-size:8px; flex-shrink:0; }

/* HINT */
#hint { position:fixed; bottom:6px; left:50%; transform:translateX(-50%); font-size:8px; color:#111; letter-spacing:3px; z-index:5; pointer-events:none; }
#hint.vis { color:#252525; }

/* NOTIF */
.notif { position:fixed; top:34px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.92); border:1px solid #2a2a2a; padding:4px 14px; font-size:9px; color:#888; letter-spacing:2px; z-index:100; animation:nfx 2.2s ease forwards; white-space:nowrap; }
@keyframes nfx{0%{opacity:0;top:28px}12%{opacity:1;top:34px}80%{opacity:1}100%{opacity:0}}

/* Other cursors */
.ucursor { position:fixed; width:5px; height:5px; border-radius:50%; pointer-events:none; z-index:60; transform:translate(-50%,-50%); }
.ucursor-label { position:fixed; font-size:8px; pointer-events:none; z-index:60; transform:translate(5px,-50%); letter-spacing:1px; white-space:nowrap; }

::-webkit-scrollbar { width:2px; }
::-webkit-scrollbar-track { background:#000; }
::-webkit-scrollbar-thumb { background:#1a1a1a; }
</style>
</head>
<body>

<div id="joinScreen">
  <div class="jbox">
    <h1>PIXEL</h1>
    <div class="sub">war · multiplayer</div>
    <input id="jname" maxlength="12" placeholder="tên của bạn" autofocus>
    <div class="color-row" id="colorRow"></div>
    <button class="jbtn" onclick="join()">THAM GIA</button>
    <div class="rules">
      <b>scroll</b> để zoom vào từng pixel<br>
      <b>Space + kéo</b> hoặc <b>chuột giữa</b> để di chuyển<br>
      <b>0</b> để fit màn hình · <b>+/−</b> để zoom<br>
      mỗi lần vẽ cách nhau <b>30 giây</b><br>
      <b>TAB</b> để ẩn/hiện giao diện
    </div>
  </div>
</div>

<canvas id="canvas"></canvas>
<div id="gridOverlay"></div>

<div id="statusBar">
  <span><span class="wdot" id="wdot"></span><b id="wlabel">kết nối...</b></span>
  <span>PHÒNG: <b id="roomLbl">—</b></span>
  <span>ONLINE: <b id="onlineCnt">0</b></span>
  <span>PIXELS: <b id="totalPxLbl">0</b></span>
  <span id="coordsLbl" style="color:#222">—</span>
  <span style="margin-left:auto;color:#1a1a1a;letter-spacing:2px">TAB</span>
</div>

<div id="toolbar">
  <div id="paletteRow" style="display:flex;gap:2px;flex-wrap:wrap;max-width:180px"></div>
  <div class="sep"></div>
  <input type="color" id="customColorInput" value="#ffffff" title="màu tuỳ chọn">
  <div class="sep"></div>
  <button class="tbtn act" id="tPen" title="bút [1]">✏</button>
  <button class="tbtn" id="tErase" title="tẩy [2]">⌫</button>
  <button class="tbtn" id="tPick" title="hút màu [3]">◎</button>
  <div class="sep"></div>
  <div class="szbtn act" data-sz="1"><div class="d" style="width:3px;height:3px"></div></div>
  <div class="szbtn" data-sz="3"><div class="d" style="width:7px;height:7px"></div></div>
  <div class="szbtn" data-sz="5"><div class="d" style="width:10px;height:10px"></div></div>
  <div class="szbtn" data-sz="9"><div class="d" style="width:14px;height:14px"></div></div>
  <div class="sep"></div>
  <button class="tbtn" id="tUsers" title="người dùng">👥</button>
  <button class="tbtn" id="tFit" title="fit màn hình [0]">⊞</button>
</div>

<div id="zoomBadge">100%</div>

<div id="cdWrap">
  <svg id="cdSvg" width="40" height="40" viewBox="0 0 40 40">
    <circle class="cdbg" cx="20" cy="20" r="17"/>
    <circle class="cdring" id="cdRing" cx="20" cy="20" r="17"/>
  </svg>
  <div id="cdNum">✓</div>
</div>

<div id="usersPanel">
  <div class="upt">ONLINE</div>
  <div id="userRows"></div>
</div>

<div id="hint">TAB</div>

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const CW = 1920, CH = 1080;     // world canvas size (pixels)
const COOLDOWN_MS = 30000;
const CD_CIRC = 2 * Math.PI * 17; // ~107
const EMPTY_HEX = '#111111';
const EMPTY_INT = 0x111111;
const ROOM = 'pixelwar-v3';

// ═══════════════════════════════════════════
//  CANVAS + PIXEL BUFFER
// ═══════════════════════════════════════════
const cvs = document.getElementById('canvas');
const ctx = cvs.getContext('2d');
cvs.width = CW; cvs.height = CH;

// ImageData — direct pixel manipulation
const imgData = ctx.createImageData(CW, CH);
const view32 = new Uint32Array(imgData.data.buffer); // RGBA as uint32 (little-endian: ABGR)

// Separate store for color values (for syncing)
const pixStore = new Uint32Array(CW * CH); // packed 0xRRGGBB
pixStore.fill(EMPTY_INT);

// Fill canvas background
fillBuf32(hexToU32('#111111'));
ctx.putImageData(imgData, 0, 0);

function hexToU32(hex) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = (n >> 16) & 0xff, g = (n >> 8) & 0xff, b = n & 0xff;
  return (0xff << 24) | (b << 16) | (g << 8) | r; // ABGR little-endian
}

function fillBuf32(u32) { view32.fill(u32); }

function setPixel(x, y, hex) {
  if (x < 0 || x >= CW || y < 0 || y >= CH) return false;
  const n = parseInt(hex.replace('#',''), 16);
  if (pixStore[y * CW + x] === n) return false;
  pixStore[y * CW + x] = n;
  const r = (n >> 16) & 0xff, g = (n >> 8) & 0xff, b = n & 0xff;
  view32[y * CW + x] = (0xff << 24) | (b << 16) | (g << 8) | r;
  return true;
}

function getPixelHex(x, y) {
  if (x < 0 || x >= CW || y < 0 || y >= CH) return null;
  const n = pixStore[y * CW + x];
  if (n === EMPTY_INT) return null;
  return '#' + n.toString(16).padStart(6,'0');
}

let dirty = false;
let rafPending = false;
function markDirty() {
  dirty = true;
  if (!rafPending) { rafPending = true; requestAnimationFrame(commitFrame); }
}
function commitFrame() {
  rafPending = false;
  if (dirty) { ctx.putImageData(imgData, 0, 0); dirty = false; }
}

// ═══════════════════════════════════════════
//  VIEWPORT — zoom + pan
// ═══════════════════════════════════════════
let vx = 0, vy = 0; // top-left world coord at screen origin
let vz = 1;         // zoom: screen pixels per world pixel
const MIN_Z = 0.08, MAX_Z = 48;

function applyTransform() {
  // Move canvas: screen(0,0) maps to world(vx,vy)
  const tx = -vx * vz;
  const ty = -vy * vz;
  cvs.style.transform = `translate(${tx}px,${ty}px) scale(${vz})`;

  // Grid overlay when very zoomed in
  const g = document.getElementById('gridOverlay');
  if (vz >= 6) {
    const sz = vz;
    const ox = (tx % sz + sz) % sz;
    const oy = (ty % sz + sz) % sz;
    g.style.backgroundSize = `${sz}px ${sz}px`;
    g.style.backgroundPosition = `${ox}px ${oy}px`;
    g.style.opacity = Math.min(0.8, (vz - 6) / 12);
  } else {
    g.style.opacity = 0;
  }

  document.getElementById('zoomBadge').textContent = Math.round(vz * 100) + '%';
}

function fitToScreen() {
  const sw = window.innerWidth, sh = window.innerHeight;
  vz = Math.min(sw / CW, sh / CH);
  vx = -(sw / vz - CW) / 2;
  vy = -(sh / vz - CH) / 2;
  applyTransform();
}

function zoomAt(sx, sy, factor) {
  const wx = sx / vz + vx;
  const wy = sy / vz + vy;
  vz = Math.max(MIN_Z, Math.min(MAX_Z, vz * factor));
  vx = wx - sx / vz;
  vy = wy - sy / vz;
  applyTransform();
}

function screenToWorld(sx, sy) {
  return { x: Math.floor(sx / vz + vx), y: Math.floor(sy / vz + vy) };
}

// ── Wheel zoom ──
window.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  zoomAt(e.clientX, e.clientY, factor);
}, { passive: false });

// ── Pan state ──
let panning = false, panAnchorX = 0, panAnchorY = 0, panStartVX = 0, panStartVY = 0;
let spaceDown = false;

function startPan(sx, sy) {
  panning = true;
  panAnchorX = sx; panAnchorY = sy;
  panStartVX = vx; panStartVY = vy;
  document.body.style.cursor = 'grabbing';
}
function doPan(sx, sy) {
  vx = panStartVX - (sx - panAnchorX) / vz;
  vy = panStartVY - (sy - panAnchorY) / vz;
  applyTransform();
}
function stopPan() {
  panning = false;
  document.body.style.cursor = spaceDown ? 'grab' : 'crosshair';
}

// ── Mouse events ──
let isDrawing = false;
cvs.addEventListener('mousedown', e => {
  if (e.button === 1) { e.preventDefault(); startPan(e.clientX, e.clientY); return; }
  if (e.button === 2) { e.preventDefault(); return; }
  if (e.button === 0) {
    if (spaceDown) { startPan(e.clientX, e.clientY); return; }
    if (myId) { isDrawing = true; doDrawE(e); }
  }
});
window.addEventListener('mousemove', e => {
  if (panning) { doPan(e.clientX, e.clientY); return; }
  const w = screenToWorld(e.clientX, e.clientY);
  document.getElementById('coordsLbl').textContent = `${w.x} · ${w.y}`;
  if (myId) sendCursor(w.x, w.y);
  if (isDrawing) doDrawE(e);
});
window.addEventListener('mouseup', e => {
  if (panning && (e.button === 1 || e.button === 0)) { stopPan(); return; }
  if (e.button === 0) { isDrawing = false; flushBatch(); }
});
cvs.addEventListener('contextmenu', e => { e.preventDefault(); if (myId) pickAt(e.clientX, e.clientY); });

// ── Keyboard ──
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); spaceDown = true; document.body.style.cursor = panning ? 'grabbing' : 'grab'; }
  if (e.key === 'Tab')    { e.preventDefault(); toggleUI(); }
  if (e.key === 'Escape') { toggleUI(false); }
  if (e.key === '0')      fitToScreen();
  if (e.key === '+' || e.key === '=') zoomAt(window.innerWidth/2, window.innerHeight/2, 1.5);
  if (e.key === '-')      zoomAt(window.innerWidth/2, window.innerHeight/2, 1/1.5);
  if (e.key === '1')      setTool('pen');
  if (e.key === '2')      setTool('erase');
  if (e.key === '3')      setTool('pick');
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space') { spaceDown = false; document.body.style.cursor = 'crosshair'; }
});

// ── Touch: pinch zoom + single-finger draw ──
let ptrs = new Map(); // pointer id → {x,y}
let lastPinchD = null;

cvs.addEventListener('pointerdown', e => {
  ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (ptrs.size === 1 && myId) { isDrawing = true; doDrawE(e); }
  if (ptrs.size === 2) { isDrawing = false; lastPinchD = pinchDist(); }
});
cvs.addEventListener('pointermove', e => {
  ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (ptrs.size === 2) {
    const d = pinchDist();
    if (lastPinchD) { const mid = pinchMid(); zoomAt(mid.x, mid.y, d / lastPinchD); }
    lastPinchD = d;
    return;
  }
  if (ptrs.size === 1 && isDrawing) doDrawE(e);
});
cvs.addEventListener('pointerup', e => { ptrs.delete(e.pointerId); if (ptrs.size < 2) lastPinchD = null; if (!ptrs.size) { isDrawing = false; flushBatch(); } });
cvs.addEventListener('pointercancel', e => { ptrs.delete(e.pointerId); });

function pinchDist() {
  const [a,b] = [...ptrs.values()];
  return Math.hypot(a.x-b.x, a.y-b.y);
}
function pinchMid() {
  const [a,b] = [...ptrs.values()];
  return { x:(a.x+b.x)/2, y:(a.y+b.y)/2 };
}

// ═══════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════
let myId = null, myName = '', myColor = '#ff3e6c';
let currentColor = '#ff3e6c', currentTool = 'pen', brushSz = 1;
let nextAllowed = 0, cdTimer = null;
let myPixels = 0, totalPixels = 0;
const users = new Map();
const cursorsMap = new Map();
let uiVisible = false, usersOpen = false;

let lastDX = -9999, lastDY = -9999;

function doDrawE(e) { doDrawAt(screenToWorld(e.clientX, e.clientY)); }

function doDrawAt({ x, y }) {
  if (currentTool === 'pick') return;
  const now = Date.now();
  if (currentTool !== 'erase' && now < nextAllowed) return;
  if (brushSz === 1 && x === lastDX && y === lastDY) return;
  lastDX = x; lastDY = y;

  const color = currentTool === 'erase' ? EMPTY_HEX : currentColor;
  const half = Math.floor(brushSz / 2);
  let placed = false;
  for (let dy = -half; dy <= half; dy++) {
    for (let dx = -half; dx <= half; dx++) {
      if (setPixel(x+dx, y+dy, color)) {
        queuePixel(x+dx, y+dy, color);
        placed = true;
      }
    }
  }
  if (placed) markDirty();

  if (currentTool !== 'erase') {
    myPixels++; totalPixels++;
    document.getElementById('totalPxLbl').textContent = totalPixels;
    nextAllowed = now + COOLDOWN_MS;
    startCD();
    renderUsers();
  }
}

function pickAt(sx, sy) {
  const { x, y } = screenToWorld(sx, sy);
  const c = getPixelHex(x, y);
  if (c) { selectColor(c); addNotif('◎ ' + c); }
}

// ═══════════════════════════════════════════
//  PIXEL BATCH SEND
// ═══════════════════════════════════════════
let pixBatch = [];
let batchTimer = null;
function queuePixel(x, y, color) {
  pixBatch.push(x, y, color);
  if (!batchTimer) batchTimer = setTimeout(flushBatch, 30);
}
function flushBatch() {
  batchTimer = null;
  if (!pixBatch.length || !wsReady) { pixBatch = []; return; }
  wsSend({ t:'px', id:myId, name:myName, color:myColor, room:ROOM, b:pixBatch.slice() });
  pixBatch = [];
}

// ═══════════════════════════════════════════
//  COOLDOWN
// ═══════════════════════════════════════════
function startCD() {
  document.getElementById('cdWrap').classList.add('vis');
  updateCD();
  if (cdTimer) clearInterval(cdTimer);
  cdTimer = setInterval(updateCD, 200);
}
function updateCD() {
  const rem = Math.max(0, nextAllowed - Date.now());
  const ring = document.getElementById('cdRing');
  const num  = document.getElementById('cdNum');
  ring.style.strokeDashoffset = CD_CIRC * (rem / COOLDOWN_MS);
  if (rem <= 0) {
    ring.classList.add('rdy'); num.textContent = '✓';
    clearInterval(cdTimer);
  } else {
    ring.classList.remove('rdy'); num.textContent = Math.ceil(rem/1000) + 's';
  }
}

// ═══════════════════════════════════════════
//  WEBSOCKET
// ═══════════════════════════════════════════
let ws = null, wsReady = false;
let pendingQ = [], reconDelay = 1500;

function wsConnect() {
  try { ws = new WebSocket('wss://socketsbay.com/wss/v2/1/demo/'); }
  catch { setTimeout(wsConnect, 3000); return; }

  ws.onopen = () => {
    wsReady = true; reconDelay = 1500; setWS(true);
    wsSend({ t:'join', id:myId, name:myName, color:myColor, room:ROOM });
    wsSend({ t:'sync_req', id:myId, room:ROOM });
    pendingQ.forEach(m => ws.send(JSON.stringify(m))); pendingQ = [];
    setInterval(() => wsSend({ t:'ping', id:myId, name:myName, color:myColor, pixels:myPixels, room:ROOM }), 8000);
  };
  ws.onclose = () => {
    wsReady = false; setWS(false);
    setTimeout(wsConnect, reconDelay = Math.min(reconDelay * 1.6, 15000));
  };
  ws.onerror = () => ws.close();
  ws.onmessage = e => {
    let m; try { m = JSON.parse(e.data); } catch { return; }
    if (!m || m.room !== ROOM || m.id === myId) return;
    onMsg(m);
  };
}

function wsSend(obj) {
  if (wsReady && ws.readyState === 1) ws.send(JSON.stringify(obj));
  else pendingQ.push(obj);
}
function setWS(ok) {
  document.getElementById('wdot').className = 'wdot' + (ok ? ' ok' : ' err');
  document.getElementById('wlabel').textContent = ok ? 'đã kết nối' : 'mất kết nối...';
}

let lastCurSend = 0;
function sendCursor(wx, wy) {
  const now = Date.now();
  if (now - lastCurSend < 60) return;
  lastCurSend = now;
  wsSend({ t:'cur', id:myId, name:myName, color:myColor, room:ROOM, wx, wy });
}

function onMsg(m) {
  if (m.t === 'join' || m.t === 'ping') {
    const isNew = !users.has(m.id);
    users.set(m.id, { name:m.name, color:m.color, pixels:m.pixels||0, lastSeen:Date.now() });
    renderUsers();
    if (isNew && m.t === 'join') { addNotif('+ ' + m.name); sendCanvasSync(); }
  }
  if (m.t === 'leave') {
    const u = users.get(m.id);
    if (u) { addNotif('− ' + u.name); users.delete(m.id); renderUsers(); removeCursor(m.id); }
  }
  if (m.t === 'px' && m.b) {
    let count = 0;
    for (let i = 0; i < m.b.length; i += 3) {
      if (setPixel(m.b[i], m.b[i+1], m.b[i+2])) count++;
    }
    if (count) markDirty();
    const u = users.get(m.id);
    if (u) { u.pixels = (u.pixels||0) + m.b.length/3; u.lastSeen = Date.now(); }
    totalPixels += m.b.length / 3;
    document.getElementById('totalPxLbl').textContent = Math.floor(totalPixels);
    renderUsers();
  }
  if (m.t === 'cur') {
    // Convert world coords → screen coords based on current viewport
    const sx = (m.wx - vx) * vz;
    const sy = (m.wy - vy) * vz;
    updateOtherCursor(m.id, m.name, m.color, sx, sy, m.wx, m.wy);
    const u = users.get(m.id); if (u) u.lastSeen = Date.now();
  }
  if (m.t === 'sync_req') sendCanvasSync();
  if (m.t === 'sync_chunk' && m.chunk) {
    m.chunk.forEach(([x,y,c]) => setPixel(x, y, c));
    markDirty();
  }
}

function sendCanvasSync() {
  const ne = [];
  for (let i = 0; i < pixStore.length; i++) {
    if (pixStore[i] !== EMPTY_INT) {
      ne.push([i % CW, Math.floor(i / CW), '#' + pixStore[i].toString(16).padStart(6,'0')]);
    }
  }
  for (let i = 0; i < ne.length; i += 400) {
    wsSend({ t:'sync_chunk', id:myId, room:ROOM, chunk:ne.slice(i,i+400) });
  }
}

// Stale user cleanup
setInterval(() => {
  const now = Date.now();
  users.forEach((u,id) => { if (now - u.lastSeen > 22000) { users.delete(id); renderUsers(); removeCursor(id); } });
}, 10000);

// ═══════════════════════════════════════════
//  OTHER-USER CURSORS
// ═══════════════════════════════════════════
function updateOtherCursor(id, name, color, sx, sy, wx, wy) {
  let c = cursorsMap.get(id);
  if (!c) {
    const dot = document.createElement('div'); dot.className = 'ucursor'; dot.style.background = color;
    const lbl = document.createElement('div'); lbl.className = 'ucursor-label'; lbl.style.color = color; lbl.textContent = name;
    document.body.appendChild(dot); document.body.appendChild(lbl);
    c = { dot, lbl, wx:0, wy:0 }; cursorsMap.set(id, c);
  }
  c.wx = wx; c.wy = wy;
  c.dot.style.left = sx + 'px'; c.dot.style.top = sy + 'px';
  c.lbl.style.left = sx + 'px'; c.lbl.style.top = sy + 'px';
}

function removeCursor(id) {
  const c = cursorsMap.get(id);
  if (c) { c.dot.remove(); c.lbl.remove(); cursorsMap.delete(id); }
}

// Reposition cursors when viewport changes
function refreshCursors() {
  cursorsMap.forEach((c) => {
    const sx = (c.wx - vx) * vz;
    const sy = (c.wy - vy) * vz;
    c.dot.style.left = sx + 'px'; c.dot.style.top = sy + 'px';
    c.lbl.style.left = sx + 'px'; c.lbl.style.top = sy + 'px';
  });
}
// Call after every viewport change
const origApply = applyTransform;
// Wrap applyTransform to also refresh cursors
function applyTransform() {
  origApply();
  refreshCursors();
}
// Re-declare to shadow
function applyTransform() {
  const tx = -vx * vz, ty = -vy * vz;
  cvs.style.transform = `translate(${tx}px,${ty}px) scale(${vz})`;
  const g = document.getElementById('gridOverlay');
  if (vz >= 6) {
    const sz = vz, ox = (tx % sz + sz) % sz, oy = (ty % sz + sz) % sz;
    g.style.backgroundSize = `${sz}px ${sz}px`;
    g.style.backgroundPosition = `${ox}px ${oy}px`;
    g.style.opacity = Math.min(0.8, (vz-6)/12);
  } else { g.style.opacity = 0; }
  document.getElementById('zoomBadge').textContent = Math.round(vz*100) + '%';
  refreshCursors();
}

// ═══════════════════════════════════════════
//  PALETTE & TOOLS
// ═══════════════════════════════════════════
const PALETTE = [
  '#000000','#ffffff','#ff3e6c','#ff922b','#ffd43b',
  '#a9e34b','#20c997','#4dabf7','#748ffc','#cc5de8',
  '#f783ac','#ff6b6b','#1a1a2e','#0f3460','#16213e',
  '#533483','#6bcb77','#00e5ff','#888888','#444444',
];
const PICK_COLORS = ['#ff3e6c','#ff922b','#ffd43b','#6bcb77','#4dabf7','#748ffc','#cc5de8','#f783ac','#ffffff','#888888'];

function buildPalette() {
  const row = document.getElementById('paletteRow');
  PALETTE.forEach(c => {
    const d = document.createElement('div'); d.className = 'sw'; d.style.background = c;
    if (c === currentColor) d.classList.add('sel');
    d.onclick = () => selectColor(c); row.appendChild(d);
  });
}

function buildColorPicker() {
  const row = document.getElementById('colorRow');
  PICK_COLORS.forEach(c => {
    const d = document.createElement('div'); d.className = 'cpick'; d.style.background = c;
    if (c === myColor) d.classList.add('sel');
    d.onclick = () => { myColor = c; document.querySelectorAll('.cpick').forEach(x=>x.classList.remove('sel')); d.classList.add('sel'); };
    row.appendChild(d);
  });
}

function selectColor(c) {
  currentColor = c;
  document.querySelectorAll('.sw').forEach(e => e.classList.toggle('sel', rgb2hex(e.style.background) === c));
  document.getElementById('customColorInput').value = c;
  if (currentTool === 'erase') setTool('pen');
}

function rgb2hex(rgb) {
  if (rgb.startsWith('#')) return rgb;
  const m = rgb.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
  return m ? '#'+[m[1],m[2],m[3]].map(x=>parseInt(x).toString(16).padStart(2,'0')).join('') : rgb;
}

document.getElementById('customColorInput').addEventListener('input', e => selectColor(e.target.value));

function setTool(t) {
  currentTool = t;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('act'));
  const map = {pen:'tPen',erase:'tErase',pick:'tPick'};
  if (map[t]) document.getElementById(map[t]).classList.add('act');
}
document.getElementById('tPen').onclick   = () => setTool('pen');
document.getElementById('tErase').onclick = () => setTool('erase');
document.getElementById('tPick').onclick  = () => setTool('pick');
document.getElementById('tFit').onclick   = fitToScreen;
document.getElementById('tUsers').onclick = () => {
  usersOpen = !usersOpen;
  document.getElementById('usersPanel').classList.toggle('vis', usersOpen);
  document.getElementById('tUsers').classList.toggle('act', usersOpen);
};

document.querySelectorAll('.szbtn').forEach(b => b.onclick = () => {
  brushSz = parseInt(b.dataset.sz);
  document.querySelectorAll('.szbtn').forEach(x=>x.classList.remove('act'));
  b.classList.add('act');
});

// ═══════════════════════════════════════════
//  UI TOGGLE
// ═══════════════════════════════════════════
function toggleUI(force) {
  uiVisible = force !== undefined ? force : !uiVisible;
  document.getElementById('statusBar').classList.toggle('vis', uiVisible);
  document.getElementById('toolbar').classList.toggle('vis', uiVisible);
  document.getElementById('zoomBadge').classList.toggle('vis', uiVisible);
  document.getElementById('hint').classList.toggle('vis', !uiVisible);
  if (!uiVisible) {
    document.getElementById('usersPanel').classList.remove('vis'); usersOpen = false;
    document.getElementById('tUsers').classList.remove('act');
  }
}

// ═══════════════════════════════════════════
//  USERS
// ═══════════════════════════════════════════
function renderUsers() {
  const el = document.getElementById('userRows'); el.innerHTML = '';
  const me = document.createElement('div'); me.className = 'urow me';
  me.innerHTML = `<div class="ua" style="background:${myColor}"></div><div class="uname">${myName}<span style="color:#1a1a1a"> (bạn)</span></div><div class="upx">${myPixels}px</div>`;
  el.appendChild(me);
  users.forEach(u => {
    const d = document.createElement('div'); d.className = 'urow';
    d.innerHTML = `<div class="ua" style="background:${u.color}"></div><div class="uname">${u.name}</div><div class="upx">${Math.floor(u.pixels||0)}px</div>`;
    el.appendChild(d);
  });
  document.getElementById('onlineCnt').textContent = 1 + users.size;
}

// ═══════════════════════════════════════════
//  NOTIFICATIONS
// ═══════════════════════════════════════════
function addNotif(msg) {
  document.querySelectorAll('.notif').forEach(e=>e.remove());
  const d = document.createElement('div'); d.className = 'notif'; d.textContent = msg;
  document.body.appendChild(d); setTimeout(()=>d.remove(), 2200);
}

// ═══════════════════════════════════════════
//  JOIN
// ═══════════════════════════════════════════
function join() {
  const n = document.getElementById('jname').value.trim();
  myName = n || ('pixel' + Math.floor(Math.random()*9999));
  myId = crypto.randomUUID?.() ?? ('u_'+Date.now()+'_'+Math.random().toString(36).slice(2,8));
  currentColor = myColor;

  document.getElementById('joinScreen').style.display = 'none';
  document.getElementById('roomLbl').textContent = ROOM;

  fitToScreen();
  renderUsers();
  toggleUI(true);

  document.getElementById('cdRing').classList.add('rdy');
  document.getElementById('cdNum').textContent = '✓';
  document.getElementById('cdWrap').classList.add('vis');

  wsConnect();
  window.addEventListener('beforeunload', () => wsSend({ t:'leave', id:myId, name:myName, room:ROOM }));
  addNotif('chào mừng, ' + myName + ' · scroll để zoom');
}

document.getElementById('jname').addEventListener('keydown', e => { if (e.key === 'Enter') join(); });

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
buildColorPicker();
buildPalette();
commitFrame();
</script>
</body>
