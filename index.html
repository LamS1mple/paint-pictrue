<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelWar — Vẽ Cùng Nhau</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --panel: #1a1a28;
    --border: #2a2a42;
    --accent: #ff3e6c;
    --accent2: #00e5ff;
    --accent3: #b967ff;
    --text: #e0e0f0;
    --text-dim: #6a6a8a;
    --pixel: 14px;
    --grid-cols: 60;
    --grid-rows: 40;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    box-shadow: 0 0 20px rgba(255,62,108,0.3);
    z-index: 10;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: var(--accent);
    text-shadow: 0 0 10px var(--accent), 0 0 30px rgba(255,62,108,0.5);
    letter-spacing: 2px;
  }

  .logo span { color: var(--accent2); }

  .header-stats {
    display: flex;
    gap: 20px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .stat-dot.online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
  .stat-dot.timer { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }

  .stat-val { color: var(--text); font-weight: bold; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* Main layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* Left panel */
  .panel-left {
    width: 220px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .panel-section {
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }

  .panel-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--accent3);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  /* Color palette */
  .palette {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
  }

  .color-cell {
    aspect-ratio: 1;
    border-radius: 2px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.1s, border-color 0.1s;
    position: relative;
  }

  .color-cell:hover { transform: scale(1.15); }
  .color-cell.selected {
    border-color: white;
    box-shadow: 0 0 8px rgba(255,255,255,0.6);
    transform: scale(1.15);
  }

  /* Tools */
  .tools {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tool-btn {
    flex: 1;
    min-width: 40px;
    padding: 8px 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    cursor: pointer;
    border-radius: 4px;
    text-align: center;
    transition: all 0.15s;
  }

  .tool-btn:hover, .tool-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(255,62,108,0.4);
  }

  /* Brush size */
  .brush-sizes {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .brush-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .brush-btn:hover, .brush-btn.active {
    border-color: var(--accent2);
    box-shadow: 0 0 8px rgba(0,229,255,0.3);
  }

  .brush-dot {
    background: var(--text);
    border-radius: 50%;
  }

  /* Online users */
  .users-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 200px;
    overflow-y: auto;
  }

  .user-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    padding: 4px 6px;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .user-item.me { border-color: var(--accent); }

  .user-avatar {
    width: 20px;
    height: 20px;
    border-radius: 2px;
    flex-shrink: 0;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .user-name { flex: 1; color: var(--text); }
  .user-pixels { color: var(--text-dim); font-size: 10px; }

  /* Canvas area */
  .canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: auto;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,62,108,0.03) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(0,229,255,0.03) 0%, transparent 50%);
    position: relative;
  }

  .canvas-wrapper {
    position: relative;
    transform-origin: center;
  }

  #pixelCanvas {
    display: grid;
    grid-template-columns: repeat(var(--grid-cols), var(--pixel));
    grid-template-rows: repeat(var(--grid-rows), var(--pixel));
    border: 1px solid var(--border);
    box-shadow:
      0 0 0 1px var(--border),
      0 0 40px rgba(0,0,0,0.8),
      0 0 80px rgba(0,0,0,0.4);
    cursor: crosshair;
    image-rendering: pixelated;
  }

  .pixel {
    width: var(--pixel);
    height: var(--pixel);
    background: #1e1e2e;
    border: 0.5px solid rgba(255,255,255,0.04);
    transition: none;
    position: relative;
  }

  .pixel:hover::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.25);
    pointer-events: none;
  }

  .pixel.just-placed {
    animation: placePixel 0.3s ease-out;
  }

  @keyframes placePixel {
    0% { filter: brightness(2); transform: scale(1.3); }
    100% { filter: brightness(1); transform: scale(1); }
  }

  /* Right panel */
  .panel-right {
    width: 200px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  /* Activity feed */
  .activity-feed {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 300px;
    overflow-y: auto;
  }

  .activity-item {
    font-size: 10px;
    padding: 4px 6px;
    border-left: 2px solid transparent;
    animation: slideIn 0.3s ease-out;
    line-height: 1.4;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .activity-item .user-color { font-weight: bold; }
  .activity-item .coords { color: var(--text-dim); }

  /* Cooldown bar */
  .cooldown-area {
    padding: 12px;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }

  .cooldown-label {
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .cooldown-bar {
    height: 6px;
    background: var(--surface);
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .cooldown-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 3px;
    transition: width 0.1s linear;
    width: 100%;
    box-shadow: 0 0 8px rgba(255,62,108,0.5);
  }

  /* Zoom controls */
  .zoom-controls {
    position: absolute;
    bottom: 16px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 5;
  }

  .zoom-btn {
    width: 36px;
    height: 36px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .zoom-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  /* Custom scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent3); }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 4px 8px;
    font-size: 10px;
    border-radius: 4px;
    pointer-events: none;
    z-index: 999;
    display: none;
    color: var(--text-dim);
  }

  /* My name input */
  .name-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 6px 8px;
    border-radius: 4px;
    width: 100%;
    outline: none;
  }

  .name-input:focus { border-color: var(--accent2); box-shadow: 0 0 8px rgba(0,229,255,0.2); }

  /* Notification */
  .notif {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--accent);
    padding: 8px 16px;
    font-size: 11px;
    border-radius: 4px;
    z-index: 999;
    box-shadow: 0 0 20px rgba(255,62,108,0.3);
    animation: notifAnim 2s ease-in-out forwards;
  }

  @keyframes notifAnim {
    0% { opacity: 0; top: 50px; }
    20% { opacity: 1; top: 60px; }
    80% { opacity: 1; top: 60px; }
    100% { opacity: 0; top: 70px; }
  }

  .mini-map {
    width: 100%;
    aspect-ratio: 3/2;
    border: 1px solid var(--border);
    border-radius: 2px;
    image-rendering: pixelated;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Pixel<span>War</span></div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-dot online"></div>
      <span>Online: </span>
      <span class="stat-val" id="onlineCount">1</span>
    </div>
    <div class="stat">
      <div class="stat-dot timer"></div>
      <span>Pixels: </span>
      <span class="stat-val" id="totalPixels">0</span>
    </div>
    <div class="stat">
      <span>Zoom: </span>
      <span class="stat-val" id="zoomDisplay">100%</span>
    </div>
  </div>
</header>

<div class="main">
  <!-- Left Panel -->
  <div class="panel-left">
    <div class="panel-section">
      <div class="panel-title">👤 Tên của bạn</div>
      <input class="name-input" id="myName" type="text" maxlength="12" placeholder="Nhập tên...">
    </div>

    <div class="panel-section">
      <div class="panel-title">🎨 Màu sắc</div>
      <div class="palette" id="palette"></div>
    </div>

    <div class="panel-section">
      <div class="panel-title">🖊 Màu tuỳ chọn</div>
      <input type="color" id="customColor" style="width:100%;height:32px;border:1px solid var(--border);background:var(--surface);cursor:pointer;border-radius:4px;" value="#ffffff">
    </div>

    <div class="panel-section">
      <div class="panel-title">🛠 Công cụ</div>
      <div class="tools">
        <button class="tool-btn active" id="toolPen" title="Bút">✏️</button>
        <button class="tool-btn" id="toolEraser" title="Tẩy">🧹</button>
        <button class="tool-btn" id="toolFill" title="Tô màu vùng">🪣</button>
        <button class="tool-btn" id="toolPicker" title="Hút màu">💉</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-title">📐 Kích thước bút</div>
      <div class="brush-sizes">
        <div class="brush-btn active" data-size="1"><div class="brush-dot" style="width:4px;height:4px"></div></div>
        <div class="brush-btn" data-size="2"><div class="brush-dot" style="width:8px;height:8px"></div></div>
        <div class="brush-btn" data-size="3"><div class="brush-dot" style="width:12px;height:12px"></div></div>
        <div class="brush-btn" data-size="5"><div class="brush-dot" style="width:18px;height:18px"></div></div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-title">👥 Online</div>
      <div class="users-list" id="usersList"></div>
    </div>

    <div class="panel-section">
      <div class="panel-title">🗺 Bản đồ nhỏ</div>
      <canvas class="mini-map" id="miniMap" width="180" height="120"></canvas>
    </div>

    <div class="panel-section">
      <button class="tool-btn" style="width:100%;font-size:11px;padding:8px;" onclick="clearCanvas()">🗑 Xóa canvas</button>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-area" id="canvasArea">
    <div class="canvas-wrapper" id="canvasWrapper">
      <div id="pixelCanvas"></div>
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoom(1.25)">+</button>
      <button class="zoom-btn" onclick="zoom(0.8)">−</button>
      <button class="zoom-btn" onclick="resetZoom()" title="Reset">⟳</button>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="panel-right">
    <div class="panel-section" style="flex:1">
      <div class="panel-title">📡 Hoạt động</div>
      <div class="activity-feed" id="activityFeed"></div>
    </div>

    <div class="cooldown-area">
      <div class="cooldown-label">
        <span>Cooldown</span>
        <span id="cooldownText">Sẵn sàng ✓</span>
      </div>
      <div class="cooldown-bar">
        <div class="cooldown-fill" id="cooldownFill" style="width:100%"></div>
      </div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// =========================================
//  CONFIG
// =========================================
const COLS = 60, ROWS = 40;
const COOLDOWN_MS = 300; // ms between pixel placements (can be tuned)

// =========================================
//  STATE
// =========================================
const pixelData = new Array(COLS * ROWS).fill('#1e1e2e');
let currentColor = '#ff3e6c';
let currentTool = 'pen';
let brushSize = 1;
let isDrawing = false;
let scale = 1;
let cooldownRemaining = 0;
let totalPixelsPlaced = 0;
let myPixelsPlaced = 0;

// Simulated users (bots + me)
const ME_ID = 'me';
const botNames = ['PixelKun', 'NhanHoa', 'ChibiArt', 'VietDraw', 'TuanPix', 'MaiColor', 'HungBit', 'LinhPX'];
const botColors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#20c997','#f06595'];

let users = [
  { id: ME_ID, name: 'Bạn', color: '#ff3e6c', pixels: 0, me: true }
];

// Spawn bots
let activeBots = [];
let nextBotId = 1;

function spawnBot() {
  if (activeBots.length >= 5) return;
  const i = Math.floor(Math.random() * botNames.length);
  const bot = {
    id: 'bot_' + (nextBotId++),
    name: botNames[i] + Math.floor(Math.random()*99),
    color: botColors[i % botColors.length],
    pixels: 0,
    me: false
  };
  activeBots.push(bot);
  users.push(bot);
  renderUsers();
  addActivity(bot, -1, -1, 'joined');
}

function removeBot() {
  if (activeBots.length === 0) return;
  const idx = Math.floor(Math.random() * activeBots.length);
  const bot = activeBots[idx];
  activeBots.splice(idx, 1);
  users = users.filter(u => u.id !== bot.id);
  renderUsers();
  addActivity(bot, -1, -1, 'left');
}

// =========================================
//  PALETTE
// =========================================
const PALETTE = [
  '#000000','#1a1a2e','#16213e','#0f3460',
  '#533483','#e94560','#ff6b6b','#ff8e53',
  '#ffd93d','#c8f441','#6bcb77','#4d96ff',
  '#00e5ff','#ffffff','#cccccc','#888888',
  '#555555','#b967ff','#f7a072','#ff3e6c',
  '#20c997','#74c0fc','#ff922b','#cc5de8',
  '#f06595','#a9e34b','#4dabf7','#ffd43b',
  '#63e6be','#e599f7','#ffa8a8','#74b816',
  '#1098ad','#d9480f','#495057','#2b2d42',
];

function buildPalette() {
  const el = document.getElementById('palette');
  PALETTE.forEach(c => {
    const cell = document.createElement('div');
    cell.className = 'color-cell';
    cell.style.background = c;
    if (c === currentColor) cell.classList.add('selected');
    cell.addEventListener('click', () => selectColor(c, cell));
    el.appendChild(cell);
  });
}

function selectColor(c, cell) {
  currentColor = c;
  document.querySelectorAll('.color-cell').forEach(el => el.classList.remove('selected'));
  if (cell) cell.classList.add('selected');
  if (currentTool === 'eraser') setTool('pen');
}

document.getElementById('customColor').addEventListener('input', e => {
  selectColor(e.target.value, null);
});

// =========================================
//  BUILD PIXEL GRID
// =========================================
function buildGrid() {
  const canvas = document.getElementById('pixelCanvas');
  canvas.innerHTML = '';
  for (let i = 0; i < COLS * ROWS; i++) {
    const px = document.createElement('div');
    px.className = 'pixel';
    px.dataset.i = i;
    const col = i % COLS, row = Math.floor(i / COLS);
    px.dataset.col = col;
    px.dataset.row = row;
    canvas.appendChild(px);
  }

  canvas.addEventListener('mousedown', e => { if (e.button === 0) { isDrawing = true; handlePixelEvent(e); } });
  canvas.addEventListener('mousemove', e => { if (isDrawing) handlePixelEvent(e); showTooltip(e); });
  canvas.addEventListener('mouseup', () => isDrawing = false);
  canvas.addEventListener('mouseleave', () => { isDrawing = false; document.getElementById('tooltip').style.display = 'none'; });
  canvas.addEventListener('contextmenu', e => { e.preventDefault(); pickColor(e); });
}

function handlePixelEvent(e) {
  const px = e.target.closest('.pixel');
  if (!px) return;
  const i = parseInt(px.dataset.i);
  const col = parseInt(px.dataset.col);
  const row = parseInt(px.dataset.row);

  if (currentTool === 'picker') { pickColorFromPixel(i); return; }
  if (currentTool === 'fill') { floodFill(col, row, currentColor); return; }
  if (cooldownRemaining > 0 && currentTool !== 'eraser') return;

  const color = currentTool === 'eraser' ? '#1e1e2e' : currentColor;
  placePixelBrush(col, row, color, ME_ID);
}

function placePixelBrush(cx, cy, color, userId) {
  const half = Math.floor(brushSize / 2);
  for (let dy = -half; dy <= half; dy++) {
    for (let dx = -half; dx <= half; dx++) {
      const col = cx + dx, row = cy + dy;
      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) continue;
      placePixel(col, row, color, userId);
    }
  }
  if (userId === ME_ID) startCooldown();
}

function placePixel(col, row, color, userId) {
  const i = row * COLS + col;
  pixelData[i] = color;
  const els = document.querySelectorAll(`.pixel[data-i="${i}"]`);
  els.forEach(px => {
    px.style.background = color;
    px.classList.remove('just-placed');
    void px.offsetWidth; // reflow
    px.classList.add('just-placed');
  });

  const user = users.find(u => u.id === userId);
  if (user) {
    user.pixels++;
    if (userId === ME_ID) {
      myPixelsPlaced++;
      document.querySelector(`#usersList .user-item.me .user-pixels`).textContent = user.pixels + ' px';
    }
  }

  totalPixelsPlaced++;
  document.getElementById('totalPixels').textContent = totalPixelsPlaced;
  updateMiniMap(col, row, color);

  if (userId !== ME_ID && user) {
    addActivity(user, col, row, 'pixel');
  }
}

// =========================================
//  FLOOD FILL
// =========================================
function floodFill(startCol, startRow, newColor) {
  const i = startRow * COLS + startCol;
  const targetColor = pixelData[i];
  if (targetColor === newColor) return;
  if (cooldownRemaining > 0) return;

  const queue = [[startCol, startRow]];
  const visited = new Set();

  while (queue.length > 0) {
    const [col, row] = queue.shift();
    const idx = row * COLS + col;
    if (visited.has(idx)) continue;
    if (col < 0 || col >= COLS || row < 0 || row >= ROWS) continue;
    if (pixelData[idx] !== targetColor) continue;
    visited.add(idx);
    placePixel(col, row, newColor, ME_ID);
    queue.push([col+1,row],[col-1,row],[col,row+1],[col,row-1]);
  }
  startCooldown();
}

// =========================================
//  COLOR PICKER
// =========================================
function pickColor(e) {
  const px = e.target.closest('.pixel');
  if (!px) return;
  pickColorFromPixel(parseInt(px.dataset.i));
}

function pickColorFromPixel(i) {
  const color = pixelData[i];
  if (color === '#1e1e2e') return;
  currentColor = color;
  document.getElementById('customColor').value = color;
  document.querySelectorAll('.color-cell').forEach(el => {
    el.classList.toggle('selected', el.style.background === color || el.style.backgroundColor === color);
  });
  setTool('pen');
  showNotif('🎨 Đã chọn màu!');
}

// =========================================
//  TOOLTIP
// =========================================
function showTooltip(e) {
  const px = e.target.closest('.pixel');
  if (!px) return;
  const tip = document.getElementById('tooltip');
  tip.style.display = 'block';
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top = (e.clientY - 6) + 'px';
  tip.textContent = `(${px.dataset.col}, ${px.dataset.row}) · ${pixelData[px.dataset.i]}`;
}

// =========================================
//  TOOLS
// =========================================
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tool' + tool.charAt(0).toUpperCase() + tool.slice(1)).classList.add('active');
}

document.getElementById('toolPen').addEventListener('click', () => setTool('pen'));
document.getElementById('toolEraser').addEventListener('click', () => setTool('eraser'));
document.getElementById('toolFill').addEventListener('click', () => setTool('fill'));
document.getElementById('toolPicker').addEventListener('click', () => setTool('picker'));

document.querySelectorAll('.brush-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    brushSize = parseInt(btn.dataset.size);
    document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// =========================================
//  COOLDOWN
// =========================================
let cooldownInterval = null;

function startCooldown() {
  if (brushSize > 3) {
    cooldownRemaining = COOLDOWN_MS * brushSize;
  } else {
    cooldownRemaining = COOLDOWN_MS;
  }
  updateCooldownUI();
  if (cooldownInterval) clearInterval(cooldownInterval);
  cooldownInterval = setInterval(() => {
    cooldownRemaining -= 50;
    if (cooldownRemaining <= 0) {
      cooldownRemaining = 0;
      clearInterval(cooldownInterval);
    }
    updateCooldownUI();
  }, 50);
}

function updateCooldownUI() {
  const fill = document.getElementById('cooldownFill');
  const text = document.getElementById('cooldownText');
  const max = COOLDOWN_MS * Math.max(brushSize, 1);
  const pct = Math.max(0, (1 - cooldownRemaining / max)) * 100;
  fill.style.width = pct + '%';
  text.textContent = cooldownRemaining > 0 ? `${cooldownRemaining}ms...` : 'Sẵn sàng ✓';
}

// =========================================
//  ZOOM
// =========================================
function zoom(factor) {
  scale = Math.max(0.3, Math.min(3, scale * factor));
  applyZoom();
}

function resetZoom() { scale = 1; applyZoom(); }

function applyZoom() {
  document.getElementById('canvasWrapper').style.transform = `scale(${scale})`;
  document.getElementById('zoomDisplay').textContent = Math.round(scale * 100) + '%';
}

document.getElementById('canvasArea').addEventListener('wheel', e => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 1.1 : 0.9);
}, { passive: false });

// =========================================
//  MINI MAP
// =========================================
function updateMiniMap(col, row, color) {
  const canvas = document.getElementById('miniMap');
  const ctx = canvas.getContext('2d');
  const pw = canvas.width / COLS;
  const ph = canvas.height / ROWS;
  ctx.fillStyle = color;
  ctx.fillRect(col * pw, row * ph, Math.max(1, pw), Math.max(1, ph));
}

function rebuildMiniMap() {
  const canvas = document.getElementById('miniMap');
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1e1e2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const color = pixelData[row * COLS + col];
      if (color !== '#1e1e2e') {
        ctx.fillStyle = color;
        ctx.fillRect(col * (canvas.width/COLS), row * (canvas.height/ROWS),
          canvas.width/COLS, canvas.height/ROWS);
      }
    }
  }
}

// =========================================
//  USERS
// =========================================
function renderUsers() {
  const el = document.getElementById('usersList');
  el.innerHTML = '';
  document.getElementById('onlineCount').textContent = users.length;
  users.forEach(u => {
    const div = document.createElement('div');
    div.className = 'user-item' + (u.me ? ' me' : '');
    div.innerHTML = `
      <div class="user-avatar" style="background:${u.color}">${u.name[0]}</div>
      <span class="user-name">${u.name}${u.me ? ' (bạn)' : ''}</span>
      <span class="user-pixels">${u.pixels} px</span>
    `;
    el.appendChild(div);
  });
}

document.getElementById('myName').addEventListener('input', e => {
  const me = users.find(u => u.me);
  if (me) {
    me.name = e.target.value || 'Bạn';
    renderUsers();
  }
});

// =========================================
//  ACTIVITY FEED
// =========================================
function addActivity(user, col, row, type) {
  const feed = document.getElementById('activityFeed');
  const item = document.createElement('div');
  item.className = 'activity-item';
  item.style.borderLeftColor = user.color;

  if (type === 'joined') {
    item.innerHTML = `<span style="color:${user.color}">${user.name}</span> đã tham gia 🟢`;
  } else if (type === 'left') {
    item.innerHTML = `<span style="color:${user.color}">${user.name}</span> đã rời đi 🔴`;
  } else {
    item.innerHTML = `<span style="color:${user.color}">${user.name}</span> <span class="coords">(${col},${row})</span>`;
  }

  feed.insertBefore(item, feed.firstChild);
  while (feed.children.length > 40) feed.removeChild(feed.lastChild);
}

// =========================================
//  BOT AI
// =========================================
function botTick() {
  activeBots.forEach(bot => {
    if (Math.random() > 0.3) return;
    const col = Math.floor(Math.random() * COLS);
    const row = Math.floor(Math.random() * ROWS);
    placePixel(col, row, bot.color, bot.id);
  });
  renderUsers();
}

// Bot join/leave simulation
function managePopulation() {
  const r = Math.random();
  if (r < 0.4 && activeBots.length < 6) spawnBot();
  else if (r > 0.7 && activeBots.length > 1) removeBot();
}

// =========================================
//  CLEAR
// =========================================
function clearCanvas() {
  for (let i = 0; i < COLS * ROWS; i++) pixelData[i] = '#1e1e2e';
  document.querySelectorAll('.pixel').forEach(px => px.style.background = '#1e1e2e');
  rebuildMiniMap();
  showNotif('🗑 Canvas đã được xóa!');
}

// =========================================
//  NOTIFICATION
// =========================================
function showNotif(msg) {
  const existing = document.querySelector('.notif');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'notif';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2100);
}

// =========================================
//  INIT
// =========================================
buildPalette();
buildGrid();
renderUsers();

// Spawn initial bots
setTimeout(() => spawnBot(), 800);
setTimeout(() => spawnBot(), 1600);
setTimeout(() => spawnBot(), 2400);

// Bot drawing interval
setInterval(botTick, 120);
// Population management
setInterval(managePopulation, 5000);

// Draw some initial pixels
setTimeout(() => {
  const initColors = ['#ff3e6c','#ffd93d','#6bcb77','#4d96ff','#b967ff'];
  for (let k = 0; k < 60; k++) {
    const col = Math.floor(Math.random() * COLS);
    const row = Math.floor(Math.random() * ROWS);
    const color = initColors[Math.floor(Math.random() * initColors.length)];
    const i = row * COLS + col;
    pixelData[i] = color;
    const px = document.querySelector(`.pixel[data-i="${i}"]`);
    if (px) px.style.background = color;
  }
  rebuildMiniMap();
}, 100);

showNotif('🎮 Chào mừng đến PixelWar!');
</script>
